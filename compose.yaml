services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    image: lpic-3-mixed-env-prep:latest
    ports:
      - "8080:8080"

  dev:
    build:
      context: .
      dockerfile: Containerfile.dev
    image: lpic-3-mixed-env-prep-dev:latest
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
